{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cart</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

    <div class="container">

        <h1 style="margin-top:30px;">
            🛒 {{ username }}'s Cart
        </h1>

        <div style="text-align:center; margin-bottom:20px;">
            <a href="{% url 'logout' %}" class="btn"
                style="background:red;">
                Logout
            </a>
        </div>

        <p style="text-align:center;
                  color:#555;
                  font-size:18px;">

            Review your selected meals before checkout

        </p>

        <br>

        <table>

            <thead>

                <tr>

                    <th>Item Image</th>

                    <th>Name</th>

                    <th>Description</th>

                    <th>Price</th>

                </tr>

            </thead>

            <tbody>

                {% for item in itemList %}

                <tr>

                    <td>

                        <img src="{{ item.picture }}"
                             class="food-img">

                    </td>

                    <td>
                        <b>{{ item.name }}</b>
                    </td>

                    <td>
                        {{ item.description }}
                    </td>

                    <td>
                        ₹ {{ item.price }}
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <br>

        <div class="card"
             style="text-align:center;">

            <h2>
                Total Price : ₹ {{ total_price }}
            </h2>

            <form action="{% url 'checkout' username %}">

                <button type="submit">

                    Proceed To Checkout 💳

                </button>

            </form>

        </div>

    </div>

</body>

</html>

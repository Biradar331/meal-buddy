{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Menu</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

    <div class="container">

        <h1 style="margin-top:30px;">
            Welcome {{ username }} 🍕
        </h1>

        <div style="text-align:center; margin-bottom:20px;">
            <a href="{% url 'logout' %}" class="btn"
                style="background:red;">
            Logout
            </a>
        </div>

        <div style="text-align:center; margin-bottom:30px;">

            <a href="{% url 'show_cart' username %}"
               class="btn">

                🛒 Go To Cart

            </a>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Item Name</th>

                    <th>Picture</th>

                    <th>Description</th>

                    <th>Price</th>

                    <th>Veg?</th>

                    <th>Operation</th>

                </tr>

            </thead>

            <tbody>

                {% for item in itemList %}

                <tr>

                    <td>
                        <b>{{ item.name }}</b>
                    </td>

                    <td>

                        <img src="{{ item.picture }}"
                             class="food-img">

                    </td>

                    <td>
                        {{ item.description }}
                    </td>

                    <td>
                        ₹ {{ item.price }}
                    </td>

                    <td>

                        {% if item.vegeterian %}

                            🟢 Veg

                        {% else %}

                            🔴 Non Veg

                        {% endif %}

                    </td>

                    <td>

                        <a href="{% url 'add_to_cart' item.id username %}"
                           class="btn">

                            Add To Cart

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
